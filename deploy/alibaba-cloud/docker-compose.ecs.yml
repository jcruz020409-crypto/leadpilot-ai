services:
  leadpilot-ai:
    image: ${ALIBABA_REGISTRY_IMAGE:-leadpilot-ai:latest}
    container_name: leadpilot-ai
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      DEPLOYMENT_PROVIDER: Alibaba Cloud
      ALIBABA_CLOUD_RUNTIME: ECS Docker
      ALIBABA_CLOUD_REGION: ${ALIBABA_CLOUD_REGION}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      QWEN_TEXT_MODEL: ${QWEN_TEXT_MODEL:-qwen-plus}
      QWEN_REASONING_MODEL: ${QWEN_REASONING_MODEL:-qwen-plus}
      QWEN_TIMEOUT_MS: ${QWEN_TIMEOUT_MS:-60000}
      LEADPILOT_FORCE_MOCK: "false"
      LEADPILOT_MOCK_WEBSITE: "false"
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SSL: ${DATABASE_SSL:-true}
      EXA_API_KEY: ${EXA_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/deployment-proof | grep -q 'LeadPilot AI Backend'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
